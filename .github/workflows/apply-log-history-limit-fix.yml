name: Apply log history limit fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-app-js:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove modal log history limits
        run: |
          python - <<'PY'
          from pathlib import Path

          app_path = Path('app.js')
          source = app_path.read_text(encoding='utf-8')

          replacements = {
              """  function renderSmokeHistoryList() {\n    const items = [...visibleCigarettes()]\n      .sort((a, b) => new Date(b.smoked_at) - new Date(a.smoked_at))\n      .slice(0, 25);\n""": """  function renderSmokeHistoryList() {\n    const items = [...visibleCigarettes()]\n      .sort((a, b) => new Date(b.smoked_at) - new Date(a.smoked_at));\n""",
              """  function renderAlcoholUnitHistoryList() {\n    const units = [...visibleAlcoholUnits()]\n      .sort((a, b) => sortDate(b.occurred_at || b.created_at) - sortDate(a.occurred_at || a.created_at))\n      .slice(0, 50);\n""": """  function renderAlcoholUnitHistoryList() {\n    const units = [...visibleAlcoholUnits()]\n      .sort((a, b) => sortDate(b.occurred_at || b.created_at) - sortDate(a.occurred_at || a.created_at));\n""",
          }

          for old, new in replacements.items():
              if old not in source:
                  raise SystemExit('Expected log history limit pattern not found in app.js')
              source = source.replace(old, new, 1)

          app_path.write_text(source, encoding='utf-8')

          workflow_path = Path('.github/workflows/apply-log-history-limit-fix.yml')
          if workflow_path.exists():
              workflow_path.unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js .github/workflows/apply-log-history-limit-fix.yml
          git commit -m "Remove log history display limits"
          git push
