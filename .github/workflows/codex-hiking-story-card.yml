name: Apply hiking story card patch

on:
  push:
    branches:
      - codex/hiking-story-card

permissions:
  contents: write

jobs:
  patch:
    if: "github.actor != 'github-actions[bot]'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add hiking story card
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('app.js')
          text = path.read_text()
          marker = "  function renderHabitPlayfulStats(activeHabits = []) {\n"
          addition = """  function buildHikingStoryMetric(habit) {
            const sessions = visibleHabitEntries(habit.id)
              .filter(entry => entry.habit_id === habit.id)
              .map(entry => buildFitnessSession(habit, entry))
              .filter(Boolean);
            const base = {
              id: habit.id,
              iconKey: 'hiking',
              eyebrow: habitCategoryMeta(habit).label,
              title: 'Wandern',
              badge: `${sessions.length} ${sessions.length === 1 ? 'Tour' : 'Touren'}`,
              main: 'Noch keine Tour',
              detail: 'Logge Kilometer und Höhenmeter – daraus wächst deine persönliche Berg-Story.',
              meta: 'Die erste Wanderung startet deine Berg-Sammlung.'
            };
            if (!sessions.length) return base;
            const summary = summarizeFitnessSessions(sessions);
            const mountains = buildMountainCollection(sessions);
            return {
              ...base,
              main: formatKmValue(summary.totalDistance),
              detail: mountains.nextMountain
                ? `${formatMetersValue(summary.totalAscent)} Höhenmeter gesammelt · noch ${formatMetersValue(mountains.nextMountain.remaining)} bis ${mountains.nextMountain.name}.`
                : `${formatMetersValue(summary.totalAscent)} Höhenmeter gesammelt · alle Bergziele erreicht.`,
              meta: `${sessions.length} Hike-Log${sessions.length === 1 ? '' : 's'} · längste Tour ${formatKmValue(summary.longestDistance)}.`
            };
          }

"""
          if addition not in text:
              if marker not in text:
                  raise SystemExit('render marker missing')
              text = text.replace(marker, addition + marker, 1)
          old = """    const cards = activeHabits
              .filter(habit => !isSystemMeditationHabit(habit))
              .filter(habit => !isFitnessDistanceHabit(habit))
              .map(buildHabitStoryMetric)
              .sort((a, b) => {
                if (a.title === 'Brotfreier Tag') return -1;
                if (b.title === 'Brotfreier Tag') return 1;
                return String(a.title).localeCompare(String(b.title), 'de');
              });
"""
          new = """    const hikingHabit = activeHabits.find(habit => isFitnessDistanceHabit(habit) && fitnessHabitType(habit) === 'hiking') || null;
            const cards = activeHabits
              .filter(habit => !isSystemMeditationHabit(habit))
              .filter(habit => !isFitnessDistanceHabit(habit))
              .map(buildHabitStoryMetric);
            if (hikingHabit) cards.push(buildHikingStoryMetric(hikingHabit));
            cards.sort((a, b) => {
              if (a.title === 'Brotfreier Tag') return -1;
              if (b.title === 'Brotfreier Tag') return 1;
              return String(a.title).localeCompare(String(b.title), 'de');
            });
"""
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('cards marker missing')
          path.write_text(text)
          PY
          rm .github/workflows/codex-hiking-story-card.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js .github/workflows/codex-hiking-story-card.yml
          git commit -m "Add hiking habit story card"
          git push